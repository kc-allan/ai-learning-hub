<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stripe Test Payment</title>
  <script src="https://js.stripe.com/v3/"></script> <!-- Stripe.js -->
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 50px auto;
      padding: 20px;
      text-align: center;
      border: 1px solid #ddd;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    #payment-form {
      margin-top: 20px;
    }
    button {
      background-color: #6772e5;
      color: white;
      font-size: 16px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:disabled {
      background-color: #bbb;
    }
  </style>
</head>
<body>
  <h1>Stripe Test Payment</h1>
  <p>Pay for a sample product</p>

  <!-- Payment form -->
  <form id="payment-form">
    <div id="card-element"><!-- Stripe will insert the card form here --></div>
    <br>
    <p>Amount: <input type="text" value=""></p>
    <button type="submit" id="submit-button">Pay</button>
    <p id="payment-status"></p>
  </form>

  <script>
    // Initialize Stripe with your publishable key
    const stripe = Stripe("pk_test_51QOic8HJIBuDrsc6S0pcgQuwq3yn9HMCj5m0PX9gtkTQLZna15nl7qOMo4aTjZzQu6HdU9Om9BqNWEz2sgpNJY6G00LFSBJotX"); // Replace with your actual publishable key
    const elements = stripe.elements();

    // Set up Stripe.js and Elements to use in the payment form
    const cardElement = elements.create('card');
    cardElement.mount('#card-element');

    // Handle form submission
    const form = document.getElementById('payment-form');
    const submitButton = document.getElementById('submit-button');
    const paymentStatus = document.getElementById('payment-status');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      submitButton.disabled = true;
      paymentStatus.textContent = "Processing...";

      // Create a payment intent on the server (replace URL with your backend endpoint)
      const response = await fetch("https://kwk0zm9j-8000.uks1.devtunnels.ms/api/v1/payment/initiate/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ 
          amount: 4000, email: "owen@proton.me", plan_id:"8bb5da8e-16eb-4b24-964b-7f10f43fad01"
        })
      });
      console.log(response)
      const { clientSecret } = await response.json();

      // Confirm the payment with the card element
      const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
        payment_method: {
          card: cardElement,
        },
      });

      if (error) {
        // Show error to the customer
        paymentStatus.textContent = `Payment failed: ${error.message}`;
        submitButton.disabled = false;
      } else if (paymentIntent.status === "succeeded") {
        // Show success to the customer
        paymentStatus.textContent = "Payment succeeded!";
      }
    });
  </script>
</body>
</html>
